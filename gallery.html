<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeForge — Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/gallery.css" />
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">VibeForge</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="studio.html" class="btn-nav">Open Studio</a>
    </div>
  </nav>

  <main class="gallery-main">
    <div class="gallery-header">
      <h1>Community Tracks</h1>
      <p>Beats created with VibeForge. Click to remix in the studio.</p>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="lo-fi">Lo-Fi</button>
      <button class="filter-btn" data-filter="electronic">Electronic</button>
      <button class="filter-btn" data-filter="hip-hop">Hip-Hop</button>
      <button class="filter-btn" data-filter="cinematic">Cinematic</button>
      <button class="filter-btn" data-filter="jazz">Jazz</button>
    </div>

    <div class="tracks-grid" id="tracks-grid">
      <!-- Generated by JS -->
    </div>
  </main>

  <script src="js/gallery.js"></script>
</body>
</html>
